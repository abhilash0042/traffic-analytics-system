# Traffic & Vehicle Analytics System - Pipeline Configuration
#
# Model strategy (major project — high accuracy):
#   - YOLO11 (Ultralytics) — better than YOLOv8 on same size tier
#   - Fine-tune from COCO pre-trained weights (never from scratch)
#   - YOLOv8-FDD (Paper 4): custom arch, cite in report only (~0.7% gain)
#
# Training guide: docs/TRAINING_PLAN.md
# Hardware profile: RTX 4050 (~6 GB VRAM) — batch sizes tuned below

paths:
  video_input: assets/videos/sample_video.mp4
  video_output: output/output_video.mp4
  results_log: output/results_log.json
  models_dir: models
  datasets_dir: data/datasets
  weights_dir: weights

models:
  vehicle:
    finetuned: models/vehicle_detector.pt
    pretrained: weights/yolo11m.pt
    fallback: weights/yolo11s.pt
    confidence: 0.35
    classes: [2, 3, 5, 7]  # car, motorcycle, bus, truck (COCO)

  plate:
    finetuned: models/plate_detector.pt
    pretrained: weights/yolo11s.pt
    fallback: weights/yolo11n.pt
    confidence: 0.40

  helmet:
    finetuned: models/helmet_detector.pt
    pretrained: weights/yolo11s.pt
    fallback: weights/yolo11n.pt
    confidence: 0.45

training:
  output_dir: runs/detect
  models_dir: models
  device: 0  # RTX 4050 — set to "cpu" only for debugging

  # Shared defaults (Paper 4 schedule + Ultralytics best practices)
  defaults:
    amp: true              # mixed precision — faster, less VRAM
    cache: false           # set true if you have spare RAM (speeds up epochs)
    workers: 4             # dataloader workers (reduce to 2 if CPU pegged)
    save_period: 5         # checkpoint every N epochs (crash safety)
    seed: 42
    cos_lr: true           # cosine learning rate decay
    optimizer: auto
    plots: true            # save loss/mAP curves in run folder
    val: true
    mosaic: 1.0            # mosaic augmentation (Paper 4)
    mixup: 0.0
    copy_paste: 0.0
    deterministic: false

  # Recommended training order: plate -> helmet -> vehicle
  plate:
    enabled: true
    base_weights: weights/yolo11s.pt
    dataset_dir: data/datasets/license_plates
    epochs: 50
    imgsz: 640
    batch: 16
    patience: 4
    close_mosaic: 10
    project: traffic_analytics
    name: plate_detector

  helmet:
    enabled: true
    base_weights: weights/yolo11s.pt
    dataset_dir: data/datasets/helmet_detection
    epochs: 50
    imgsz: 640
    batch: 16
    patience: 4
    close_mosaic: 10
    project: traffic_analytics
    name: helmet_detector

  vehicle:
    enabled: true
    base_weights: weights/yolo11m.pt
    dataset_dir: data/datasets/vehicle_detection
    epochs: 100
    imgsz: 640
    batch: 8
    patience: 4
    close_mosaic: 10
    project: traffic_analytics
    name: vehicle_detector

  # RTX 5060 upgrade profile (uncomment and swap when available):
  # vehicle_5060:
  #   base_weights: yolo11l.pt
  #   batch: 16
  #   epochs: 150
  #   patience: 30
  #   imgsz: 832

tracking:
  max_age: 30
  n_init: 3

anpr:
  ocr_languages: [en]
  min_plate_width: 60
  min_plate_height: 20
  ocr_every_n_frames: 3
  vote_window: 10
  plate_patterns:
    - "^[A-Z]{2}[0-9]{1,2}[A-Z]{1,3}[0-9]{1,4}$"
    - "^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$"

preprocessing:
  bilateral_d: 11
  bilateral_sigma_color: 17
  bilateral_sigma_space: 17
  adaptive_block_size: 11
  adaptive_c: 2
  clahe_clip_limit: 2.0
  clahe_tile_size: 8

pipeline:
  enable_anpr: true
  enable_helmet: true
  anpr_on_vehicle_crop: true
  vehicle_crop_padding: 0.10
  log_every_n_frames: 30
