# Traffic & Vehicle Analytics System - Pipeline Configuration
#
# Model strategy (major project — high accuracy):
#   - YOLO11 (Ultralytics) — better than YOLOv8 on same size tier
#   - Fine-tune from COCO pre-trained weights (never from scratch)
#   - YOLOv8-FDD (Paper 4): custom arch, cite in report only (~0.7% gain)
#
# Training guide: docs/TRAINING_PLAN.md
# Hardware profile: RTX 4050 (~6 GB VRAM) — batch sizes tuned below

paths:
  video_input: assets/videos/sample_video.mp4
  # For ANPR testing use a clip with visible plates, e.g.:
  # video_input: data/datasets/sample_videos/traffic_clip_1.mp4
  video_output: output/output_video.mp4
  results_log: output/results_log.json
  models_dir: models
  datasets_dir: data/datasets
  weights_dir: weights

models:
  vehicle:
    finetuned: models/vehicle_detector.pt
    pretrained: weights/yolo11m.pt
    fallback: weights/yolo11s.pt
    confidence: 0.35
    classes: [2, 3, 5, 7]  # car, motorcycle, bus, truck (COCO)

  plate:
    finetuned: models/plate_detector.pt
    pretrained: weights/yolo11s.pt
    fallback: weights/yolo11n.pt
    confidence: 0.28              # lower = catch more blurry/small plates
    detect_conf_fallback: 0.15    # second pass if first finds nothing
    detect_imgsz: 960             # larger input helps small plates in video

  helmet:
    finetuned: models/helmet_detector.pt
    pretrained: weights/yolo11s.pt
    fallback: weights/yolo11n.pt
    confidence: 0.45

training:
  output_dir: runs/detect
  models_dir: models
  device: 0  # RTX 4050 — set to "cpu" only for debugging

  # Shared defaults (Paper 4 schedule + Ultralytics best practices)
  defaults:
    amp: true              # mixed precision — faster, less VRAM
    cache: false           # set true if you have spare RAM (speeds up epochs)
    workers: 4             # dataloader workers (reduce to 2 if CPU pegged)
    save_period: 5         # checkpoint every N epochs (crash safety)
    seed: 42
    cos_lr: true           # cosine learning rate decay
    optimizer: auto
    plots: true            # save loss/mAP curves in run folder
    val: true
    mosaic: 1.0            # mosaic augmentation (Paper 4)
    mixup: 0.0
    copy_paste: 0.0
    deterministic: false

  # Recommended training order: plate -> helmet -> vehicle
  plate:
    enabled: true
    base_weights: weights/yolo11s.pt
    dataset_dir: data/datasets/license_plates
    epochs: 50
    imgsz: 640
    batch: 16
    patience: 4
    close_mosaic: 10
    project: traffic_analytics
    name: plate_detector
    # Augmentation for Indian dashcam / CCTV (blur, night, rain, angle)
    hsv_h: 0.02
    hsv_s: 0.75
    hsv_v: 0.55
    degrees: 8.0
    translate: 0.15
    scale: 0.55
    fliplr: 0.5

  helmet:
    enabled: true
    base_weights: weights/yolo11s.pt
    dataset_dir: data/datasets/helmet_detection
    epochs: 50
    imgsz: 640
    batch: 16
    patience: 4
    close_mosaic: 10
    project: traffic_analytics
    name: helmet_detector
    # Indian traffic / dashcam augmentation
    hsv_h: 0.02
    hsv_s: 0.80
    hsv_v: 0.60
    degrees: 10.0
    translate: 0.18
    scale: 0.50
    fliplr: 0.5

  vehicle:
    enabled: true
    base_weights: weights/yolo11m.pt
    dataset_dir: data/datasets/vehicle_detection
    epochs: 100
    imgsz: 640
    batch: 8
    patience: 4
    close_mosaic: 10
    project: traffic_analytics
    name: vehicle_detector
    # After first vehicle train, refine with: python train_models.py --vehicles --continue-best

  # RTX 5060 upgrade profile (uncomment and swap when available):
  # vehicle_5060:
  #   base_weights: yolo11l.pt
  #   batch: 16
  #   epochs: 150
  #   patience: 30
  #   imgsz: 832

tracking:
  max_age: 30
  n_init: 3

anpr:
  ocr_languages: [en]
  min_plate_width: 32           # allow very small plates (upscaled before OCR)
  min_plate_height: 12
  upscale_min_width: 180        # bicubic upscale tiny crops for OCR
  ocr_every_n_frames: 1         # every frame — important for moving video
  vote_window: 15               # majority vote across recent frames
  multi_variant_ocr: true       # try threshold / CLAHE / sharpen / invert
  fuzzy_validation: true        # tolerate OCR noise on Indian plates
  detect_full_frame_fallback: true
  plate_patterns:
    - "^[A-Z]{2}[0-9]{1,2}[A-Z]{1,3}[0-9]{1,4}$"
    - "^[A-Z]{2}[0-9]{2}[A-Z]{2}[0-9]{4}$"

preprocessing:
  bilateral_d: 11
  bilateral_sigma_color: 17
  bilateral_sigma_space: 17
  adaptive_block_size: 11
  adaptive_c: 2
  clahe_clip_limit: 3.0
  clahe_tile_size: 8
  # Video / dashcam enhancement (Indian low-light, motion blur)
  enable_video_enhance: true
  denoise_strength: 7
  sharpen_amount: 1.2
  low_light_clahe: true
  video_clahe_clip: 3.0

pipeline:
  enable_anpr: true
  enable_helmet: true
  anpr_on_vehicle_crop: true
  vehicle_crop_padding: 0.15    # wider search around vehicle
  video_enhance_for_anpr: true  # denoise + CLAHE before plate detect
  draw_plate_boxes: true        # show plate bounding boxes on output video
  log_every_n_frames: 30
